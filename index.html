<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Label Quick-Print</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0a;color:#f0f0f0;font-family:'DM Mono','Courier New',monospace;min-height:100vh}
button{font-family:'DM Mono','Courier New',monospace}
input{font-family:'DM Mono','Courier New',monospace}
input[type=range]{width:100%;accent-color:#FFD200;cursor:pointer;height:6px}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{display:none}

.screen{max-width:480px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
.hdr{background:#0d0d0d;border-bottom:2px solid #FFD200;padding:13px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20}
.htitle{flex:1;font-size:17px;font-weight:700;letter-spacing:1.5px;color:#FFD200}
.body{flex:1;padding:14px 14px 90px;display:flex;flex-direction:column;gap:11px}

.card{background:#141414;border:1px solid #222;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.lbl{font-size:11px;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:1.2px}
.inp{background:#0d0d0d;border:1.5px solid #222;border-radius:9px;color:#f0f0f0;font-size:16px;padding:13px 14px;width:100%;outline:none}

.btn-y{background:#FFD200;color:#000;border:none;border-radius:10px;padding:15px 20px;font-size:16px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-d{background:#1a1a1a;color:#f0f0f0;border:1px solid #222;border-radius:10px;padding:15px 20px;font-size:16px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-sm{background:#1e1e1e;color:#f0f0f0;border:1px solid #222;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px;color:#666;display:flex;align-items:center}

.toast-ok{background:#0d2818;border:1px solid #4ade80;color:#4ade80;border-radius:10px;padding:11px 14px;font-size:14px}
.toast-err{background:#2a0a0a;border:1px solid #f87171;color:#f87171;border-radius:10px;padding:11px 14px;font-size:14px}

.sugg-wrap{position:relative}
.sugg{background:#181818;border:1px solid #FFD20044;border-radius:9px;overflow:hidden;position:absolute;width:100%;z-index:15;top:100%;box-shadow:0 8px 24px #000000bb;max-height:280px;overflow-y:auto}
.srow{padding:12px 15px;font-size:15px;cursor:pointer;border-bottom:1px solid #222;display:flex;align-items:center;gap:10px}
.srow:last-child{border-bottom:none}
.srow:active{background:#222}

.qgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.qbtn{background:#1a1a1a;color:#f0f0f0;border:1px solid #222;border-radius:9px;padding:12px 0;font-size:18px;font-weight:700;cursor:pointer;text-align:center;width:100%;transition:background .1s,color .1s}
.qbtn.active{background:#FFD200;color:#000;border:none}
.qbtn:disabled{opacity:.3;cursor:not-allowed}



/* ANDROID FILE PICKER FIX — label wraps the hidden input, acts as the button */
.file-label{display:flex;align-items:center;justify-content:center;gap:10px;background:#FFD200;color:#000;border:none;border-radius:12px;padding:20px;font-size:17px;font-weight:700;cursor:pointer;width:100%;text-align:center;letter-spacing:.4px}
#csv-input{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}

.info-box{background:#111;border:1px solid #222;border-radius:10px;padding:14px;font-size:13px;color:#777;line-height:1.8}
.info-title{font-size:12px;color:#FFD200;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.info-step{padding:4px 0;border-bottom:1px solid #222}
.info-step:last-child{border-bottom:none}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.divider{display:flex;align-items:center;gap:10px}
.divider-line{flex:1;height:1px;background:#222}
.section{background:#141414;border-radius:10px;padding:16px;border:1px solid #222}
.sec-title{font-size:13px;font-weight:700;color:#FFD200;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.search-wrap{background:#0d0d0d;border:1.5px solid #222;border-radius:9px;display:flex;align-items:center;gap:10px;padding:0 14px}
.search-inp{background:transparent;border:none;color:#f0f0f0;font-size:16px;outline:none;flex:1;padding:13px 0}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.preview-box{background:#0d0d0d;border-radius:8px;padding:12px;border:1px solid #222;margin-top:8px}
.rng-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rng-ends{display:flex;justify-content:space-between;font-size:11px;color:#444;margin-top:2px}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}

.overlay{position:fixed;inset:0;background:#000000cc;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center}
.prog-bar{width:220px;height:6px;background:#222;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:#FFD200;border-radius:99px;transition:width .3s}

.preview-list{background:#141414;border:1px solid #222;border-radius:10px;overflow:hidden;max-height:300px;overflow-y:auto}
.preview-row{padding:10px 14px;border-bottom:1px solid #222;font-size:14px}
.preview-row:last-child{border-bottom:none}
</style>
</head>

const getBP=()=>`http://${settings.bpHost}:9090`;
async function sendZPL(uid,zpl){
  try{const r=await fetch(`${getBP()}/write`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({device:{uid},data:zpl})});return r.ok;}catch{return false;}
}
async function checkDot(){
  try{const r=await fetch(`${getBP()}/available`);const d=await r.json();S.dot=(d.printer||[]).length?'#4ade80':'#f87171';}catch{S.dot='#f87171';}
  render();
}
async function refreshPrinters(){
  try{const r=await fetch(`${getBP()}/available`);const d=await r.json();S.printers=d.printer||[];S.dot=S.printers.length?'#4ade80':'#f87171';}catch{S.printers=[];S.dot='#f87171';}
  render();
}

function buildZPL(name,address,caseNum,total,date){
  const showAddr=settings.showAddress&&address&&address.trim();
  const {labelW,labelH,fontName,fontCases,fontMeta}=settings;
  let y=20,lines=[];
  // Big customer name
  lines.push(`^FO20,${y}^A0N,${fontName},${fontName}^FB${labelW-40},2,0,L^FD${name}^FS`);
  y+=Math.ceil(fontName*1.2)+(showAddr?4:8);
  // Address (if enabled)
  if(showAddr){
    lines.push(`^FO20,${y}^A0N,${fontMeta},${fontMeta}^FB${labelW-40},2,0,L^FD${address}^FS`);
    y+=Math.ceil(fontMeta*2.2)+6;
  }
  // Divider
  lines.push(`^FO20,${y}^GB${labelW-40},3,3^FS`);y+=10;
  // Big X of Y — centred
  const xofyTxt=total>1?`${caseNum} of ${total}`:`${total}`;
  lines.push(`^FO20,${y}^A0N,${fontCases},${fontCases}^FB${labelW-40},1,0,C^FD${xofyTxt}^FS`);
  y+=fontCases+8;
  // Date small at bottom
  lines.push(`^FO20,${y}^A0N,${fontMeta},${fontMeta}^FD${date}^FS`);
  return `^XA\n^PW${labelW}\n^LL${labelH}\n${lines.join('\n')}\n^XZ`;
}

async function printLabels(n){
  if(!settings.printerUid){showStatus('err','No printer selected — go to Settings');return;}
  const date=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  abortPrint=false;
  S.progress={cur:0,total:n};render();
  for(let i=1;i<=n;i++){
    if(abortPrint){S.progress=null;S.printingN=null;showStatus('err','Cancelled');return;}
    S.progress={cur:i,total:n};render();
    const zpl=buildZPL(S.selected.name,S.selected.address||'',i,n,date);
    const ok=await sendZPL(settings.printerUid,zpl);
    if(!ok){S.progress=null;S.printingN=null;showStatus('err',`Failed on label ${i} of ${n}`);return;}
    if(i<n)await new Promise(r=>setTimeout(r,300));
  }
  S.progress=null;S.printingN=null;
  showStatus('ok',n===1?'✓ 1 label printed':`✓ ${n} labels printed — 1 of ${n} through ${n} of ${n}`);
}

// ─────────────────────────────────────────────────────────────────
// CSV — tuned for QuickB2B format (*ContactName, POAddressLine1 etc)
// ─────────────────────────────────────────────────────────────────
function parseCSV(text){
  const lines=text.trim().replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(Boolean);
  if(lines.length<2)return[];
  function splitLine(line){
    const cols=[];let cur='';let q=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){q=!q;}
      else if(c===','&&!q){cols.push(cur.trim());cur='';}
      else{cur+=c;}
    }
    cols.push(cur.trim());
    return cols.map(c=>c.replace(/^"|"$/g,'').trim());
  }
  const headers=splitLine(lines[0]).map(h=>h.replace(/^\*/,'').toLowerCase());
  // Name column
  const nameIdx=headers.findIndex(h=>h==='contactname'||h.includes('name')||h.includes('company')||h.includes('customer')||h.includes('client'));
  // Address columns — QuickB2B uses POAddressLine1, POCity, PORegion, POPostalCode
  const addrIdx  =headers.findIndex(h=>h==='pOaddressline1'||h==='poaddressline1'||h.includes('addressline1')||h.includes('address'));
  const cityIdx  =headers.findIndex(h=>h==='pOcity'||h==='pocity'||h==='city'||h==='suburb');
  const regionIdx=headers.findIndex(h=>h==='pOregion'||h==='poregion'||h==='region'||h==='state');
  const postIdx  =headers.findIndex(h=>h==='pOpostalcode'||h==='popostalcode'||h==='postalcode'||h==='postcode');
  const col=nameIdx>=0?nameIdx:0;
  return lines.slice(1).map(line=>{
    const cols=splitLine(line);
    const name=(cols[col]||'').trim();
    if(!name)return null;
    // Build address from parts
    const parts=[
      addrIdx>=0?cols[addrIdx]:'',
      cityIdx>=0?cols[cityIdx]:'',
      regionIdx>=0?cols[regionIdx]:'',
      postIdx>=0?cols[postIdx]:'',
    ].map(p=>(p||'').trim()).filter(Boolean);
    const address=parts.join(', ');
    return{name,address};
  }).filter(Boolean);
}

function processCSV(text){
  if(!text||!text.trim()){showStatus('err','File appears empty');return;}
  const parsed=parseCSV(text);
  if(!parsed.length){showStatus('err','No names found in CSV');return;}
  const existing=new Set(customers.map(c=>c.name.toLowerCase()));
  const newOnes=parsed.filter(r=>!existing.has(r.name.toLowerCase()));
  S.csvPreview={newOnes,skipped:parsed.length-newOnes.length};
  render();
}

// CSV file input handler — set up ONCE outside render loop
document.getElementById('csv-input').addEventListener('change',function(){
  const file=this.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>processCSV(e.target.result);
  reader.onerror=()=>showStatus('err','Could not read file');
  reader.readAsText(file);
  this.value=''; // reset so same file can be picked again
});

  if(S.progress){

function attachListeners(){
  const si=document.getElementById('search-inp');
  if(si){
    si.addEventListener('input',e=>{
      S.search=e.target.value;
      if(S.search.trim()){
        const q=S.search.trim().toLowerCase();
        const first=customers.filter(c=>c.name.toLowerCase().split(/\s+/)[0].startsWith(q));
        const fallback=customers.filter(c=>c.name.toLowerCase().split(/\s+/).some(w=>w.startsWith(q)));
        S.sugg=first.length?first:fallback;
      } else { S.sugg=[]; }
      render();
      // Restore focus
      const ni=document.getElementById('search-inp');
      if(ni){ni.focus();const len=ni.value.length;ni.setSelectionRange(len,len);}
    });
  }
  const ni=document.getElementById('name-inp');
  if(ni){
    ni.addEventListener('input',e=>{
      S.formName=e.target.value;
      S.addSugg=!S.editId&&S.formName.trim()?customers.filter(c=>c.name.toLowerCase().startsWith(S.formName.toLowerCase())).slice(0,4):[];
      render();
      const nn=document.getElementById('name-inp');
      if(nn){nn.focus();const len=nn.value.length;nn.setSelectionRange(len,len);}
    });
    ni.addEventListener('keydown',e=>{ if(e.key==='Enter') saveCustomer(); });
  }
  const ai=document.getElementById('addr-inp');
  if(ai){
    ai.addEventListener('input',e=>{ S.formAddr=e.target.value; });
    ai.addEventListener('keydown',e=>{ if(e.key==='Enter') saveCustomer(); });
  }
  // Range sliders
  ['fontName','fontCases','fontMeta','labelW','labelH'].forEach(k=>{
    const el=document.getElementById('rng-'+k);
    if(el) el.addEventListener('input',e=>{ settings[k]=+e.target.value; saveSet(); updatePreview(); ; });
  });
}

function confirmImport(){
  if(!S.csvPreview)return;
  const existing=new Set(customers.map(c=>c.name.toLowerCase()));
  S.csvPreview.newOnes.forEach(r=>{
    if(!existing.has(r.name.toLowerCase())){
      customers.push({id:Date.now()+Math.random(),name:r.name,address:r.address||''});
    }
  });
  saveCust();
  const n=S.csvPreview.newOnes.length;
  S.csvPreview=null;
  showStatus('ok',`✓ Imported ${n} customer${n!==1?'s':''}`);
  go('list');
}

function saveCustomer(){
  const name=S.formName.trim();if(!name)return;
  if(S.editId){
    const idx=customers.findIndex(c=>c.id===S.editId);
    if(idx>=0){customers[idx].name=name;customers[idx].address=S.formAddr.trim();}
  } else {
    if(customers.find(c=>c.name.toLowerCase()===name.toLowerCase())){showStatus('err','Customer already exists');return;}
    customers.push({id:Date.now(),name,address:S.formAddr.trim()});
  }
  saveCust();S.formName='';S.formAddr='';S.editId=null;S.addSugg=[];
  showStatus('ok',S.editId?'Saved':'Customer added');
  go('list');
}

    S.printers.forEach(p=>{
      const sel=settings.printerUid===p.uid;
      printerHTML+=`<div class="card" style="cursor:pointer;margin-bottom:8px;border:${sel?'2px solid #FFD200':'1px solid #222'}" onclick="settings.printerUid='${p.uid}';saveSet();render()">
        ${ic(D.prnt,20,sel?'#FFD200':'#555')}
        <div style="flex:1"><div style="font-size:14px;font-weight:600">${esc(p.name||p.uid)}</div><div style="font-size:11px;color:#555">${esc(p.uid)}</div></div>
        ${sel?ic(D.check,17,'#FFD200'):''}
      </div>`;
    });
  }

  const fn=settings.fontName, fc=settings.fontCases, fm=settings.fontMeta;
  const pName=Math.round(fn*0.22), pCases=Math.round(fc*0.22), pMeta=Math.round(fm*0.22);

  scr.innerHTML=`
    ${hdr('SETTINGS','list')}
    <div class="body">

      <div class="section">
        <div class="row">
          <div class="sec-title" style="margin-bottom:0">ZEBRA PRINTER</div>
          <button class="btn-sm" onclick="refreshPrinters()">${ic(D.ref,13)} Refresh</button>
        </div>
        <div style="margin-top:12px">${printerHTML}</div>
      </div>

      <div class="section">
        <div class="sec-title">BROWSERPRINT HOST</div>
        <div style="font-size:12px;color:#555;margin-bottom:10px;line-height:1.6">
          On PC press Win+R → <b style="color:#888">cmd</b> → type <b style="color:#888">ipconfig</b><br>
          Enter the <b style="color:#888">IPv4 Address</b> below (e.g. 192.168.1.45)<br>
          Use <b style="color:#888">localhost</b> if opening on the PC itself.
        </div>
        <input class="inp" id="bp-host-inp" value="${settings.bpHost||'localhost'}"
          placeholder="e.g. 192.168.1.45"
          style="margin-bottom:10px"
          oninput="settings.bpHost=this.value.trim();saveSet()"/>
        <button class="btn-sm" style="width:100%;justify-content:center" onclick="refreshPrinters()">
          ${ic(D.ref,13)} Test Connection &amp; Find Printer
        </button>
      </div>
      <div class="section">
        <div class="sec-title">LABEL SIZE</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
          ${[
            {key:'100x70',  label:'100 × 70mm', w:799, h:559},
            {key:'101x51',  label:'101 × 51mm', w:812, h:406},
            {key:'57x32',   label:'57 × 32mm',  w:456, h:256},
            {key:'50x25',   label:'50 × 25mm',  w:399, h:199},
            {key:'custom',  label:'Custom',      w:null,h:null},
          ].map(p=>`<button onclick="applyPreset('${p.key}',${p.w},${p.h})"
            style="background:${settings.labelPreset===p.key?'#FFD200':'#1a1a1a'};color:${settings.labelPreset===p.key?'#000':'#f0f0f0'};border:1px solid ${settings.labelPreset===p.key?'#FFD200':'#222'};border-radius:9px;padding:11px 8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">
            ${p.label}</button>`).join('')}
        </div>
        ${settings.labelPreset==='custom'?`
        <div class="grid2">
          <div><div class="lbl">Width (dots)</div><input class="inp" type="number" id="rng-labelW" value="${settings.labelW}" oninput="settings.labelW=+this.value;saveSet()"/></div>
          <div><div class="lbl">Height (dots)</div><input class="inp" type="number" id="rng-labelH" value="${settings.labelH}" oninput="settings.labelH=+this.value;saveSet()"/></div>
        </div>
        <div style="font-size:11px;color:#444;margin-top:8px">203dpi ≈ 8 dots/mm</div>`:''}
      </div>
      <div class="section">
        <div class="sec-title">LABEL OPTIONS</div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0">
          <div>
            <div style="font-size:15px;font-weight:600">Print address on label</div>
            <div style="font-size:12px;color:#555;margin-top:2px">Shows delivery address under name</div>
          </div>
          <div onclick="settings.showAddress=!settings.showAddress;saveSet();render()"
            style="width:50px;height:28px;border-radius:99px;background:${settings.showAddress?'#FFD200':'#333'};cursor:pointer;position:relative;transition:background .2s;flex-shrink:0">
            <div style="width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:3px;left:${settings.showAddress?'25px':'3px'};transition:left .2s"></div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="sec-title">${ic(D.font,15,'#FFD200')} FONT SIZES</div>

        <div class="lbl">Customer Name</div>
        <div class="rng-row"><span style="color:#888;font-size:13px">Size</span><span style="color:#FFD200;font-weight:700" id="val-fontName">${fn}</span></div>
        <input type="range" min="28" max="80" step="2" value="${fn}" id="rng-fontName"/>
        <div class="rng-ends"><span>Smaller</span><span>Larger</span></div>

        <div class="lbl" style="margin-top:14px">Box Count (X of Y)</div>
        <div class="rng-row"><span style="color:#888;font-size:13px">Size</span><span style="color:#FFD200;font-weight:700" id="val-fontCases">${fc}</span></div>
        <input type="range" min="28" max="80" step="2" value="${fc}" id="rng-fontCases"/>
        <div class="rng-ends"><span>Smaller</span><span>Larger</span></div>

        <div class="lbl" style="margin-top:14px">Date / Labels / Address</div>
        <div class="rng-row"><span style="color:#888;font-size:13px">Size</span><span style="color:#FFD200;font-weight:700" id="val-fontMeta">${fm}</span></div>
        <input type="range" min="14" max="44" step="2" value="${fm}" id="rng-fontMeta"/>
        <div class="rng-ends"><span>Smaller</span><span>Larger</span></div>

        <div class="preview-box" id="preview-box">
          <div style="font-size:10px;color:#444;margin-bottom:8px;letter-spacing:1px">PREVIEW</div>
          <div id="pv-name" style="font-size:${pName}px;font-weight:700;color:#f0f0f0;line-height:1.2">Customer Name</div>
          <div style="height:1px;background:#222;margin:6px 0"></div>
          <div id="pv-num" style="font-size:${pCases}px;font-weight:700;color:#FFD200;text-align:center">2 of 5</div>
          <div id="pv-date" style="font-size:${pMeta}px;color:#555;margin-top:4px">19 Mar 2026</div>
        </div>
      </div>

    </div>`;

  // Attach slider listeners after render
  ['fontName','fontCases','fontMeta'].forEach(k=>{
    const el=document.getElementById('rng-'+k);
    if(!el)return;
    el.addEventListener('input',e=>{
      settings[k]=+e.target.value; saveSet();
      const vEl=document.getElementById('val-'+k); if(vEl)vEl.textContent=settings[k];
      updatePreview();
    });
  });
}

function updatePreview(){
  const fn=settings.fontName,fc=settings.fontCases,fm=settings.fontMeta;
  const set=(id,prop,val)=>{ const e=document.getElementById(id); if(e)e.style[prop]=val+'px'; };
  set('pv-name','fontSize',Math.round(fn*0.22));
  set('pv-num','fontSize',Math.round(fc*0.22));
  set('pv-date','fontSize',Math.round(fm*0.22));
}

// ─────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────
checkDot();
render();
</script>
</body>
</html>
